[flake8]
ignore = N802,W503,E402
max-line-length = 160
exclude = migrations,.ropeproject,static,_static,build

[tool:pytest]
DJANGO_SETTINGS_MODULE = eventyay.config.settings

[coverage:run]
source = socialmedia
omit = */migrations/*,*/urls.py,*/tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __str__
    def __repr__
    if settings.DEBUG
    NOQA
    NotImplementedError

[check-manifest]
ignore =
    .update-locales.sh
    .install-hooks.sh
    pretixplugin.toml
    Makefile
    manage.py
    tests/*
	*.po
	.gitkeep
